zerops:
  - setup: dev
    build:
      base: nodejs@22
      buildCommands:
        - npm install
        - mkdir -p fonts
        - curl -fsSL -o /tmp/dejavu.tar.bz2 https://downloads.sourceforge.net/project/dejavu/dejavu/2.37/dejavu-fonts-ttf-2.37.tar.bz2
        - tar -xjf /tmp/dejavu.tar.bz2 -C /tmp
        - cp /tmp/dejavu-fonts-ttf-2.37/ttf/DejaVuSans.ttf fonts/DejaVuSans.ttf
        - cp /tmp/dejavu-fonts-ttf-2.37/ttf/DejaVuSans-Bold.ttf fonts/DejaVuSans-Bold.ttf
      deployFiles: ./
      cache:
        - node_modules
    run:
      base: nodejs@22
      os: ubuntu
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: development
        DB_NAME: ${db_dbName}
        DB_HOST: ${db_hostname}
        DB_PORT: ${db_port}
        DB_USER: ${db_user}
        DB_PASS: ${db_password}
      start: node server.js
      healthCheck:
        httpGet:
          port: 3000
          path: /health

  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        - npm ci --omit=dev
        - mkdir -p fonts
        - curl -fsSL -o /tmp/dejavu.tar.bz2 https://downloads.sourceforge.net/project/dejavu/dejavu/2.37/dejavu-fonts-ttf-2.37.tar.bz2
        - tar -xjf /tmp/dejavu.tar.bz2 -C /tmp
        - cp /tmp/dejavu-fonts-ttf-2.37/ttf/DejaVuSans.ttf fonts/DejaVuSans.ttf
        - cp /tmp/dejavu-fonts-ttf-2.37/ttf/DejaVuSans-Bold.ttf fonts/DejaVuSans-Bold.ttf
      deployFiles:
        - ./node_modules
        - ./views
        - ./public
        - ./fonts
        - ./server.js
        - ./db.js
        - ./pdf.js
        - ./package.json
      cache:
        - node_modules
    deploy:
      readinessCheck:
        httpGet:
          port: 3000
          path: /health
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        DB_NAME: ${db_dbName}
        DB_HOST: ${db_hostname}
        DB_PORT: ${db_port}
        DB_USER: ${db_user}
        DB_PASS: ${db_password}
      start: node server.js
      healthCheck:
        httpGet:
          port: 3000
          path: /health
      verticalAutoscaling:
        minRam: 0.25
        minFreeRamGB: 0.125
